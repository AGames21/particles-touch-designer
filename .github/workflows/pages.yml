# Publish to GitHub Pages by syncing main -> gh-pages on every push.
# The Pages site is configured to serve the gh-pages branch, and GitHub's
# built-in "pages build and deployment" picks up each sync automatically.
# (This route needs only `contents: write`, which the default workflow
# token has — unlike the Actions-source Pages API, which needs admin.)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push main snapshot to gh-pages
        run: git push --force origin HEAD:gh-pages
